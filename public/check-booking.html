<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Booking — Marlin Rentals</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="/" class="nav__logo"><img src="/images/logo.svg" alt="Marlin Rentals"></a>
    <ul class="nav__links">
      <li><a href="/">Home</a></li>
      <li><a href="/fleet.html">Our Fleet</a></li>
      <li><a href="/book.html">Book Now</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/check-booking.html">My Booking</a></li>
    </ul>
    <a href="/book.html" class="nav__cta">Book Now</a>
    <button class="nav__toggle" aria-label="Menu">☰</button>
  </nav>
</header>

<section class="container" style="padding-top:48px; max-width:520px;">
  <h1 class="section-title">Check Your Booking</h1>
  <p class="section-sub">Enter your booking number (from your confirmation email) and the email you booked with.</p>

  <form id="lookup-form" class="card"><div class="card__body">
    <label for="booking_id">Booking number</label>
    <input id="booking_id" name="booking_id" type="number" min="1" required>
    <div style="height:14px"></div>
    <label for="email">Email address</label>
    <input id="email" name="email" type="email" required>
    <div id="lookup-alert"></div>
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;">Look Up Booking</button>
  </div></form>

  <div id="result"></div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">&copy; <span id="year"></span> Marlin Rentals. All rights reserved.</div>
  </div>
</footer>

<script src="/js/nav.js"></script>
<script src="/js/footer-year.js"></script>
<script src="/js/api.js"></script>
<script src="/js/check-booking.js"></script>
</body>
</html>
