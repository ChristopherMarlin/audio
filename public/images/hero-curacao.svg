<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#bdeef0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fd4d6"/>
      <stop offset="1" stop-color="#0ea5b8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#sky)"/>
  <circle cx="1010" cy="150" r="90" fill="#ffd35c" opacity="0.9"/>
  <rect y="380" width="1200" height="320" fill="url(#sea)"/>
  <path d="M0 380 Q150 350 300 380 T600 380 T900 380 T1200 380 V420 H0 Z" fill="#ffffff" opacity="0.25"/>

  <!-- Willemstad-style colorful waterfront houses -->
  <g transform="translate(60,270)">
    <rect width="120" height="110" fill="#f4a15c"/>
    <polygon points="-6,0 60,-40 126,0" fill="#c9683a"/>
    <rect x="20" y="30" width="26" height="40" fill="#fff7e6"/>
    <rect x="70" y="30" width="26" height="40" fill="#fff7e6"/>
  </g>
  <g transform="translate(190,285)">
    <rect width="100" height="95" fill="#f6e05e"/>
    <polygon points="-6,0 50,-36 106,0" fill="#c9a227"/>
    <rect x="16" y="25" width="24" height="36" fill="#fffef2"/>
    <rect x="58" y="25" width="24" height="36" fill="#fffef2"/>
  </g>
  <g transform="translate(300,260)">
    <rect width="130" height="120" fill="#4fb3bf"/>
    <polygon points="-6,0 65,-42 136,0" fill="#2f8b96"/>
    <rect x="24" y="34" width="28" height="42" fill="#f0fbfc"/>
    <rect x="78" y="34" width="28" height="42" fill="#f0fbfc"/>
  </g>
  <g transform="translate(440,278)">
    <rect width="105" height="102" fill="#e8778a"/>
    <polygon points="-6,0 52,-38 110,0" fill="#c14f63"/>
    <rect x="18" y="28" width="24" height="38" fill="#fff5f6"/>
    <rect x="62" y="28" width="24" height="38" fill="#fff5f6"/>
  </g>
  <g transform="translate(560,265)">
    <rect width="115" height="115" fill="#f2a640"/>
    <polygon points="-6,0 57,-40 121,0" fill="#c97d24"/>
    <rect x="20" y="30" width="26" height="40" fill="#fff7e6"/>
    <rect x="68" y="30" width="26" height="40" fill="#fff7e6"/>
  </g>

  <!-- Palm trees -->
  <g transform="translate(920,300)">
    <rect x="-6" y="0" width="12" height="90" fill="#8a5a2b"/>
    <g fill="#1f9d6b">
      <ellipse cx="0" cy="-10" rx="55" ry="16" transform="rotate(20 0 -10)"/>
      <ellipse cx="0" cy="-10" rx="55" ry="16" transform="rotate(-20 0 -10)"/>
      <ellipse cx="0" cy="-14" rx="55" ry="16" transform="rotate(70 0 -14)"/>
      <ellipse cx="0" cy="-14" rx="55" ry="16" transform="rotate(-70 0 -14)"/>
      <ellipse cx="0" cy="-20" rx="50" ry="14"/>
    </g>
  </g>
  <g transform="translate(1080,320)">
    <rect x="-5" y="0" width="10" height="70" fill="#8a5a2b"/>
    <g fill="#22b17a">
      <ellipse cx="0" cy="-8" rx="42" ry="12" transform="rotate(20 0 -8)"/>
      <ellipse cx="0" cy="-8" rx="42" ry="12" transform="rotate(-20 0 -8)"/>
      <ellipse cx="0" cy="-12" rx="42" ry="12" transform="rotate(70 0 -12)"/>
      <ellipse cx="0" cy="-12" rx="42" ry="12" transform="rotate(-70 0 -12)"/>
      <ellipse cx="0" cy="-16" rx="38" ry="11"/>
    </g>
  </g>
</svg>
